/* ============================== HELPERS ============================== */

const rollD = (sides) => Math.floor(Math.random() * sides) + 1;
const rollDice = (count, sides) => Array.from({ length: count }, () => rollD(sides)).reduce((a,b)=>a+b,0);
const rollDiceArray = (count, sides) => Array.from({ length: count }, () => rollD(sides));
const parseDie = (str) => { const [c, s] = str.split("d").map(Number); return { count: c, sides: s }; };
const statMod = (stat) => Math.floor(stat / 2) - 3;
const uid = () => Math.random().toString(36).slice(2, 10);
const xpForLevel = (lvl) => lvl * 100;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function performCheck(target, label) {
  const nat = rollD(20);
  const critSuccess = nat === 1;
  const critFail = nat === 20;
  const success = critSuccess || (!critFail && nat <= target);
  return { nat, target, success, critSuccess, critFail, label };
}

        <span>{label}</span><span>{value}/{max}</span>
      </div>
      <div className="w-full h-2.5 rounded-full overflow-hidden" style={{ background: "#2a2117" }}>
        <div className={colorClass} style={{ width: `${pct}%`, height: "100%", transition: "width .35s ease" }} />
      </div>
    </div>
  );
}

function DiceCard({ roll }) {
  if (roll.simple) {
    return (
      <div className="dice-card dice-card--success">
        <div className="dice-card__icon"><Dices size={18} /></div>
        <div className="dice-card__body">
          <div className="dice-card__label">{roll.label}</div>
          <div className="dice-card__math">🎲 <b>{roll.nat}</b></div>
        </div>
      </div>
    );
  }
  const outcomeText = roll.critSuccess ? "대성공" : roll.critFail ? "대실패" : roll.success ? "성공" : "실패";
  const tone = roll.critSuccess ? "crit-success" : roll.critFail ? "crit-fail" : roll.success ? "success" : "fail";
  return (
    <div className={`dice-card dice-card--${tone}`}>
      <div className="dice-card__icon"><Dices size={18} /></div>
      <div className="dice-card__body">
        <div className="dice-card__label">{roll.label}</div>
        <div className="dice-card__math">
          🎲 <b>{roll.nat}</b> — {roll.statLabel ? `${roll.statLabel} ` : ""}{roll.target} 이하면 성공
        </div>
      </div>
      <div className="dice-card__outcome">{outcomeText}</div>
    </div>
  );
}

function DamageCard({ result }) {
  return (
    <div className="dice-card dice-card--damage">
      <div className="dice-card__icon"><Sword size={18} /></div>
      <div className="dice-card__body">
        <div className="dice-card__label">{result.label}</div>
        <div className="dice-card__math">
          🎲 {result.rolls.join(" + ")}{result.bonus ? ` + ${result.bonus}` : ""} = <b>{result.total}</b> 데미지
        </div>
      </div>
      <div className="dice-card__outcome dice-card__outcome--dmg">{result.total}</div>
    </div>
  );
}

function PendingRollCard({ entry, onRoll }) {
  const isDamage = entry.kind === "damage";
  return (
    <div className={`dice-card dice-card--pending ${isDamage ? "dice-card--pending-damage" : ""}`}>
      <div className="dice-card__icon dice-card__icon--pulse">{isDamage ? <Sword size={18} /> : <Dices size={18} />}</div>
      <div className="dice-card__body">
        <div className="dice-card__label">{entry.label}</div>
        <div className="dice-card__math">
          {isDamage ? `${entry.diceCount}d${entry.diceSides}${entry.bonus ? ` + ${entry.bonus}` : ""}` : `${entry.statLabel ? entry.statLabel + " " : ""}${entry.target} 이하면 성공`}
        </div>
      </div>
      <button className="roll-btn" onClick={onRoll}>굴리기</button>
    </div>
  );
}

function LogEntry({ entry, onResolvePending }) {
  if (entry.type === "dice") return <DiceCard roll={entry.roll} />;
  if (entry.type === "damage") return <DamageCard result={entry.result} />;
  if (entry.type === "pending") return <PendingRollCard entry={entry} onRoll={() => onResolvePending(entry.id)} />;
  if (entry.type === "player") return <div className="log-player">{entry.text}</div>;
  if (entry.type === "system") return <div className="log-system">{entry.text}</div>;
  return <div className="log-narrative">{entry.text}</div>;
}

/* ============================== CHARACTER CREATION ============================== */

function CreationFlow({ onComplete }) {
  const [step, setStep] = useState(0);
  const [draft, setDraft] = useState({
    name: "", age: "", gender: "", raceRoll: null, jobRoll: null, bg: {},
    stats: null, appearance: null, bonusChoice: null,
  });

  const steps = ["name","age","gender","race","job","background","stats","appearance","summary"];
  const cur = steps[step];
  const next = () => setStep((s) => Math.min(s + 1, steps.length - 1));
  const prev = () => setStep((s) => Math.max(s - 1, 0));

  const rollRace = () => {
    const r = rollD(10);
    setDraft((d) => ({ ...d, raceRoll: r, bonusChoice: null }));
  };

  const rollJob = () => {
    const r = rollD(8);
    setDraft((d) => ({ ...d, jobRoll: r }));
  };

  const rollStats = () => {
    const base = {};
    const rolls = {};
    STAT_KEYS.forEach((k) => {
      const r = rollD(20);
      rolls[k] = [r];
      base[k] = r;
    });
    const race = RACES[draft.raceRoll];
    const final = { ...base };
    if (race.mods) STAT_KEYS.forEach((k) => { final[k] = clamp((final[k] || 0) + (race.mods[k] || 0), 1, 20); });
    if (race.choiceBonus && draft.bonusChoice) final[draft.bonusChoice] += 1;
    setDraft((d) => ({ ...d, stats: final, statRolls: rolls }));
  };

  const rollAppearance = () => {
    setDraft((d) => ({
      ...d,
      appearance: { height: rollDice(2,6), build: rollDice(2,6), feature: rollDice(2,6) },
    }));
  };

  const canProceed = () => {
    if (cur === "name") return draft.name.trim().length > 0;
    if (cur === "age") return String(draft.age).trim().length > 0 && !isNaN(Number(draft.age));
    if (cur === "gender") return !!draft.gender;
    if (cur === "race") return draft.raceRoll && (!RACES[draft.raceRoll].choiceBonus || draft.bonusChoice) && (!RACES[draft.raceRoll].needsSubtype || (draft.raceSubtype || "").trim());
    if (cur === "job") return !!draft.jobRoll;
    if (cur === "background") return BG_QUESTIONS.every((q) => draft.bg[q.key] && draft.bg[q.key].trim());
    if (cur === "stats") return !!draft.stats;
    if (cur === "appearance") return !!draft.appearance;
    return true;
  };

  return (
    <div className="creation-screen">
      <div className="creation-eyebrow">에스나 대륙 · 모험자 기록서 {step+1}/{steps.length}</div>

      {cur === "name" && (
        <StepCard title="당신의 이름은?">
          <input className="text-input" placeholder="이름을 입력하세요" value={draft.name}
            onChange={(e) => setDraft({ ...draft, name: e.target.value })} />
        </StepCard>
      )}

      {cur === "age" && (
        <StepCard title="나이는 몇입니까?">
          <input className="text-input" type="number" placeholder="나이" value={draft.age}
            onChange={(e) => setDraft({ ...draft, age: e.target.value })} />
        </StepCard>
      )}

      {cur === "gender" && (
        <StepCard title="성별을 선택하세요">
          <div className="choice-grid">
            {["남성","여성","기타"].map((g) => (
              <button key={g} className={`choice-btn ${draft.gender===g?"choice-btn--active":""}`}
                onClick={() => setDraft({ ...draft, gender: g })}>{g}</button>
            ))}
          </div>
        </StepCard>
      )}

      {cur === "race" && (
        <StepCard title="운명의 굴림 — 종족 (d10)">
          {!draft.raceRoll ? (
            <button className="primary-btn" onClick={rollRace}><Dices size={16}/> d10 굴리기</button>
          ) : (
            <>
              <DiceCard roll={{ nat: draft.raceRoll, simple: true, label: "종족 굴림" }} />
              <div className="race-result">
                <div className="race-result__name">{RACES[draft.raceRoll].name}</div>
                <div className="race-result__desc">{RACES[draft.raceRoll].desc}</div>
                {RACES[draft.raceRoll].mods && (
                  <div className="race-result__mods">
                    {Object.entries(RACES[draft.raceRoll].mods).map(([k,v]) => (
                      <span key={k} className="mod-chip">{STAT_LABELS[k]} {v>0?`+${v}`:v}</span>
                    ))}
                  </div>
                )}
                {RACES[draft.raceRoll].choiceBonus && (
                  <div className="choice-grid choice-grid--wrap">
                    {STAT_KEYS.map((k) => (
                      <button key={k} className={`choice-btn choice-btn--sm ${draft.bonusChoice===k?"choice-btn--active":""}`}
                        onClick={() => setDraft({ ...draft, bonusChoice: k })}>{STAT_LABELS[k]} +1</button>
                    ))}
                  </div>
                )}
                {RACES[draft.raceRoll].needsSubtype && (
                  <div className="subtype-input">
                    <div className="subtype-input__label">{RACES[draft.raceRoll].subtypeLabel}</div>
                    <input className="text-input" placeholder={RACES[draft.raceRoll].subtypePlaceholder}
                      value={draft.raceSubtype || ""}
                      onChange={(e) => setDraft({ ...draft, raceSubtype: e.target.value })} />
                  </div>
                )}
              </div>
            </>
          )}
        </StepCard>
      )}

      {cur === "job" && (
        <StepCard title="운명의 굴림 — 직업 (d8)">
          {!draft.jobRoll ? (
            <button className="primary-btn" onClick={rollJob}><Dices size={16}/> d8 굴리기</button>
          ) : (
            <>

                <div className="race-result__name">{JOBS[JOB_KEYS_BY_ROLL[draft.jobRoll]].name}</div>
                <div className="race-result__desc">첫 스킬 「{JOBS[JOB_KEYS_BY_ROLL[draft.jobRoll]].skills[0].name}」을(를) 익힌 채로 여정을 시작한다</div>
                <div className="race-result__mods">
                  <span className="mod-chip">{JOBS[JOB_KEYS_BY_ROLL[draft.jobRoll]].skills[0].name}: {JOBS[JOB_KEYS_BY_ROLL[draft.jobRoll]].skills[0].desc}</span>
                </div>
              </div>
            </>
          )}
        </StepCard>
      )}

      {cur === "background" && (
        <StepCard title="지난 삶에 대하여">
          {BG_QUESTIONS.map((q) => (
            <div key={q.key} className="bg-question">
              <div className="bg-question__text">{q.q}</div>
              <div className="choice-grid choice-grid--col">
                {q.options.map((opt) => (
                  <button key={opt} className={`choice-btn ${draft.bg[q.key]===opt?"choice-btn--active":""}`}
                    onClick={() => setDraft({ ...draft, bg: { ...draft.bg, [q.key]: opt, [`${q.key}_custom`]: "" } })}>{opt}</button>
                ))}
                <input className="text-input text-input--sm" placeholder="직접 입력..."
                  value={draft.bg[`${q.key}_custom`] || ""}
                  onChange={(e) => setDraft({ ...draft, bg: { ...draft.bg, [q.key]: e.target.value, [`${q.key}_custom`]: e.target.value } })} />
              </div>
            </div>
          ))}
        </StepCard>
      )}

      {cur === "stats" && (
        <StepCard title="능력치 굴림 (d20 × 6)">
          {!draft.stats ? (
            <button className="primary-btn" onClick={rollStats}><Dices size={16}/> d20 굴리기</button>
          ) : (
            <div className="stat-grid">
              {STAT_KEYS.map((k) => (
                <div key={k} className="stat-cell">
                  <div className="stat-cell__label">{STAT_LABELS[k]}</div>
                  <div className="stat-cell__value">{draft.stats[k]}</div>
                  <div className="stat-cell__mod">{statMod(draft.stats[k]) >= 0 ? "+" : ""}{statMod(draft.stats[k])}</div>
                  <div className="stat-cell__rolls">🎲 {draft.statRolls[k][0]}</div>
                </div>
              ))}
            </div>
          )}
        </StepCard>
      )}

      {cur === "appearance" && (
        <StepCard title="외모 굴림 (2d6 × 3)">
          {!draft.appearance ? (
            <button className="primary-btn" onClick={rollAppearance}><Dices size={16}/> 외모 굴리기</button>
          ) : (
            <div className="appearance-list">
              <div className="appearance-row"><b>신장</b> ({draft.appearance.height}) — {HEIGHT_TABLE[draft.appearance.height]}</div>
              <div className="appearance-row"><b>체형</b> ({draft.appearance.build}) — {BUILD_TABLE[draft.appearance.build]}</div>
              <div className="appearance-row"><b>특징</b> ({draft.appearance.feature}) — {FEATURE_TABLE[draft.appearance.feature]}</div>
            </div>
          )}
        </StepCard>
      )}

      {cur === "summary" && (
        <StepCard title="모험을 시작하기 전에">
          <div className="summary-card">
            <div className="summary-line"><b>{draft.name}</b> · {draft.age}세 · {draft.gender} · {RACES[draft.raceRoll].name}{draft.raceSubtype && draft.raceSubtype.trim() ? ` (${draft.raceSubtype.trim()})` : ""} · {JOBS[JOB_KEYS_BY_ROLL[draft.jobRoll]].name}</div>
            <div className="summary-line summary-line--muted">{draft.bg.motive} · {draft.bg.past} · {draft.bg.values}</div>
            <div className="stat-grid stat-grid--summary">
              {STAT_KEYS.map((k) => (
                <div key={k} className="stat-cell stat-cell--sm">
                  <div className="stat-cell__label">{STAT_LABELS[k]}</div>
                  <div className="stat-cell__value">{draft.stats[k]}</div>
                </div>
              ))}
            </div>
            <div className="summary-line">{HEIGHT_TABLE[draft.appearance.height]}, {BUILD_TABLE[draft.appearance.build]}. {FEATURE_TABLE[draft.appearance.feature]}.</div>
            <div className="traits-list">
              <div className="panel__subtitle">종족 특성 · 배경 특성</div>
              {[RACE_TRAITS[draft.raceRoll], PAST_TRAITS[draft.bg.past]].filter(Boolean).map((t) => (
                <div key={t.name} className="trait-card">
                  <div className="trait-card__name">{t.name}</div>
                  <div className="trait-card__desc">{t.desc}</div>
                </div>
              ))}
              <div className="panel__subtitle">직업 스킬 (1티어)</div>
              <div className="trait-card trait-card--job">
                <div className="trait-card__name">{JOBS[JOB_KEYS_BY_ROLL[draft.jobRoll]].skills[0].name}</div>
                <div className="trait-card__desc">{JOBS[JOB_KEYS_BY_ROLL[draft.jobRoll]].skills[0].desc}</div>
              </div>
            </div>
          </div>
        </StepCard>
      )}

      <div className="creation-nav">
        {step > 0 && <button className="secondary-btn" onClick={prev}>이전</button>}
        {cur !== "summary" ? (
          <button className="primary-btn" disabled={!canProceed()} onClick={next}>다음 <ChevronRight size={16}/></button>
        ) : (
          <button className="primary-btn" onClick={() => onComplete(draft)}>모험 시작 <Sparkles size={16}/></button>
        )}
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("creation");
  const [character, setCharacter] = useState(null);
  const [log, setLog] = useState([]);
  const [panel, setPanel] = useState(null); // 'bestiary'|'quest'|'inventory'|'status'|null
  const [combat, setCombat] = useState(null);
  const [nodeIdx, setNodeIdx] = useState(0);
  const [input, setInput] = useState("");
  const [pendingPersuade, setPendingPersuade] = useState(false);
  const [resetConfirm, setResetConfirm] = useState(false);
  const logEndRef = useRef(null);
  const pendingResolvers = useRef({});

  useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [log]);

  const pushLog = (entry) => {
    const id = entry.id || uid();
    setLog((l) => [...l, { ...entry, id }]);
    return id;
  };
  const pushNarrative = (text) => pushLog({ type: "narrative", text });
  const pushSystem = (text) => pushLog({ type: "system", text });
  const pushDice = (roll) => pushLog({ type: "dice", roll });

  const hasPendingRoll = log.some((e) => e.type === "pending");
  const hasActiveChoice = log.length > 0 && log[log.length - 1].type === "choice";

  const queueRoll = (label, statLabel, target, onResult) => {
    const id = pushLog({ type: "pending", kind: "check", label, statLabel, target });
    pendingResolvers.current[id] = onResult;
  };

  const queueDamageRoll = (label, diceCount, diceSides, bonus, onResult) => {
    const id = pushLog({ type: "pending", kind: "damage", label, diceCount, diceSides, bonus });
    pendingResolvers.current[id] = onResult;
  };

  const resolvePendingRoll = (id) => {
    const entry = log.find((e) => e.id === id);
    if (!entry) return;
    const cb = pendingResolvers.current[id];
    delete pendingResolvers.current[id];
    if (entry.kind === "damage") {
      const rolls = rollDiceArray(entry.diceCount, entry.diceSides);
      const total = rolls.reduce((a,b)=>a+b,0) + (entry.bonus || 0);
      const result = { label: entry.label, rolls, bonus: entry.bonus || 0, total };
      setLog((l) => l.map((e) => (e.id === id ? { id, type: "damage", result } : e)));
      if (cb) cb(result);
      return;
    }
    const roll = performCheck(entry.target, entry.label);
    setLog((l) => l.map((e) => (e.id === id ? { id, type: "dice", roll: { ...roll, statLabel: entry.statLabel } } : e)));
    if (cb) cb(roll);
  };

  const onCreationComplete = (draft) => {
    const c = buildCharacter(draft);
    setCharacter(c);
    setScreen("game");
    pushNarrative(STORY_NODES[0].text(c));
  };

  const updateChar = (fn) => setCharacter((c) => { const nc = { ...c }; fn(nc); return nc; });

  const gainItem = (name, id, qty=1) => {
    updateChar((c) => {
      const existing = c.inventory.find((i) => i.id === id);
      if (existing) existing.qty += qty;
      else if (c.inventory.length < 10) c.inventory.push({ id, name, qty });
      else pushSystem(`가방이 가득 차 ${name}을(를) 챙기지 못했다.`);
    });
  };

  const useItem = (item) => {
    const effect = ITEM_EFFECTS[item.id];
    if (!effect) { pushSystem(`${item.name}은(는) 지금 사용할 수 없다.`); return; }
    if (effect.type === "heal") {
      updateChar((c) => {
        c.hp = Math.min(c.maxHp, c.hp + effect.amount);
        c.inventory = c.inventory
          .map((i) => (i.id === item.id ? { ...i, qty: i.qty - 1 } : i))
          .filter((i) => i.qty > 0);
      });
      pushSystem(`${item.name}을(를) 사용했다. ${effect.flavor} (HP +${effect.amount})`);
    }
  };

  const handleLevelUpCheck = () => {
    updateChar((c) => {
      const need = xpForLevel(c.level);
      if (c.xp >= need) {
        c.level += 1; c.xp -= need; c.statPoints += 2;
        c.maxHp += 5; c.maxMp += 3; c.hp = c.maxHp; c.mp = c.maxMp;
        pushSystem(`레벨 업! Lv.${c.level}이 되었다. 분배 가능한 능력치 포인트 +2 (상태 창에서 분배하세요)`);
      }
    });
  };

  /* ---------- Exploration checks ---------- */

  const doStealthCheck = () => {
    const penalty = character.alert >= 2 ? 4 : 0;
    const target = character.stats.dex + getTraitBonus(character, "stealth") - penalty;
    queueRoll("은신 판정", "민첩", target, (roll) => {
      if (roll.success) {
        pushNarrative("그림자 속으로 미끄러지듯 몸을 숨긴다. 아무도 눈치채지 못한 듯하다.");
        updateChar((c) => { c.alert = Math.max(0, c.alert - 1); });
        advanceNode();
      } else {
        const newAlert = Math.min(3, character.alert + 1);
        updateChar((c) => { c.alert = newAlert; });
        if (newAlert >= 3) {
          pushNarrative("작은 돌부리에 걸려 소리를 내고 만다. 그림자 속 눈동자가 이쪽을 향한다 — 발각되었다!");
          startCombat();
        } else {
          pushNarrative(`은신에 실패했지만 다행히 들키진 않은 듯하다. (경계 ${newAlert}/3)`);
          advanceNode();
        }
      }
    });
  };

  const doTrapCheck = () => {
    const target = character.stats.wis + getTraitBonus(character, "trap");
    queueRoll("함정 감지", "지혜", target, (roll) => {
      if (roll.success) {
        pushNarrative("발밑에서 희미한 실선을 발견한다 — 누군가 설치한 견제용 장치다.");
        pushSystem("해제를 시도하거나, 우회할 수 있습니다.");
        pushLog({ type: "choice", options: [
          { label: "🔧 해제 시도 (민첩)", action: "disarm" },
          { label: "↩️ 우회한다", action: "advance" },
        ]});
      } else {
        const dmg = rollD(6) + 2;
        pushNarrative("무심코 내디딘 발이 장치를 건드린다. 날카로운 통증이 스친다!");
        updateChar((c) => { c.hp = Math.max(0, c.hp - dmg); });
        pushSystem(`피해 ${dmg}을(를) 입었다.`);
        advanceNode();
      }
    });
  };

  const doDisarm = () => {
    const target = character.stats.dex + getTraitBonus(character, "trap");
    queueRoll("함정 해제", "민첩", target, (roll) => {
      if (roll.success) { pushNarrative("섬세한 손놀림으로 장치를 무력화한다."); gainItem("녹슨 부품", "i_scrap", 1); }
      else { const dmg = rollD(4); updateChar((c)=>{c.hp=Math.max(0,c.hp-dmg);}); pushNarrative("장치가 오작동하며 튕겨 나온다."); pushSystem(`피해 ${dmg}.`); }
      advanceNode();
    });
  };

  const doPersuade = () => {
    const npc = "항구의 상인 데린";
    if (character.usedTopics.includes(npc)) {
      pushSystem("이미 같은 주제로 이야기를 나눴다. 더 할 말이 없어 보인다.");
      return;
    }
    const affinity = character.npcAffinity[npc] || 0;
    const target = character.stats.cha + getTraitBonus(character, "persuade") + Math.floor(affinity / 10);
    queueRoll(`설득 판정 (호감도 ${affinity})`, "매력", target, (roll) => {
      updateChar((c) => {
        c.usedTopics = [...c.usedTopics, npc];
        c.npcAffinity[npc] = clamp(affinity + (roll.success ? 15 : -5), -100, 100);
      });
      if (roll.success) { pushNarrative("상대의 눈빛이 누그러진다. 유용한 정보와 함께 작은 호의를 얻는다."); gainItem("정보 쪽지", "i_note", 1); }
      else { pushNarrative("말이 통하지 않는다. 상대는 팔짱을 낀 채 등을 돌린다."); }
      advanceNode();
    });
  };

  /* ---------- Hidden skill/job discovery (rare) ---------- */

  const triggerHiddenSkill = () => {
    if (character.hiddenSkillsGranted >= MAX_HIDDEN_SKILLS) return;
    if (character.unlockedSkillTier >= 5) return;
    if (Math.random() >= HIDDEN_SKILL_CHANCE) return;
    const nextTier = character.unlockedSkillTier + 1;
    const skill = JOBS[character.job].skills.find((s) => s.tier === nextTier);
    if (!skill) return;
    updateChar((c) => {
      c.hiddenSkillsGranted = (c.hiddenSkillsGranted || 0) + 1;
      c.unlockedSkillTier = nextTier;
    });
    pushSystem("✨ 우연한 깨달음의 순간");
    pushNarrative(`거듭된 경험 끝에, 한 단계 더 깊은 경지에 닿는다. 새로운 스킬 「${skill.name}」을(를) 깨우쳤다!`);
  };

  const advanceNode = () => setTimeout(() => {
    let didAdvance = false;
    setNodeIdx((i) => {
      const next = Math.min(i + 1, STORY_NODES.length - 1);
      if (next !== i) {
        didAdvance = true;
        pushNarrative(STORY_NODES[next].text(character));
      }
      return next;
    });
    if (didAdvance) triggerHiddenSkill();
  }, 300);

  /* ---------- Combat ---------- */

  const startCombat = () => {
    const pool = character.bestiary.filter((m) => m.tier <= Math.ceil(character.level));
    const enemy = { ...pool[Math.floor(Math.random() * pool.length)] };
    enemy.curHp = enemy.hp;
    updateChar((c) => { c.bestiary = c.bestiary.map((m) => m.id === enemy.id ? { ...m, discovered: true } : m); });
    setCombat({ enemy, log: [], enemyFlustered: false });
    pushSystem(`⚔️ ${enemy.name}과(와) 전투가 시작된다!`);
  };

  const combatAttack = (skill=null) => {
    if (!combat) return;
    const job = JOBS[character.job];
    const atkStat = job.atkStat;
    const traitBonus = getTraitBonus(character, "combat");
    const flusterBonus = combat.enemyFlustered ? 2 : 0;
    const target = character.stats[atkStat] + traitBonus + flusterBonus + 2 - Math.floor(combat.enemy.dex / 4);
    const dmgBonus = Math.max(0, statMod(character.stats[atkStat]) + traitBonus);
    const weaponDie = parseDie(job.weaponDie);
    const statLabel = STAT_LABELS[atkStat];
    if (combat.enemyFlustered) setCombat((cb) => cb ? ({ ...cb, enemyFlustered: false }) : cb);

    queueRoll(skill ? `${skill.name} 명중 판정` : "공격 명중 판정", statLabel, target, (roll) => {
      if (skill) updateChar((c) => { c.mp = Math.max(0, c.mp - skill.mp); });

      if (!roll.success) {
        pushNarrative("공격이 빗나간다.");
        queueEnemyTurn();
        return;
      }

      let diceCount = weaponDie.count + (skill ? skill.diceBonus : 0);
      if (roll.critSuccess) diceCount *= 2;
      else if (target - roll.nat >= 5) diceCount += 1;

      queueDamageRoll(
        skill ? `${skill.name} 데미지` : "공격 데미지",
        diceCount, weaponDie.sides, dmgBonus,
        (dmgResult) => {
          const dmg = Math.max(1, dmgResult.total);
          const newHp = Math.max(0, combat.enemy.curHp - dmg);
          pushNarrative(`${skill ? skill.name + "을(를) 사용해 " : ""}일격을 가한다! ${dmg}의 피해를 입혔다.`);
          setCombat((cb) => cb ? ({ ...cb, enemy: { ...cb.enemy, curHp: newHp } }) : cb);

          if (newHp <= 0) {
            finishCombatWin({ ...combat.enemy, curHp: 0 });
          } else {
            queueEnemyTurn();
          }
        }
      );
    });
  };

  const queueEnemyTurn = () => {
    if (!combat) return;
    const enemy = combat.enemy;
    const target = enemy.str + 2 - Math.floor(character.stats.dex / 4);
    const die = parseDie(enemy.dmgDie);

    queueRoll(`${enemy.name}의 공격`, "힘", target, (roll) => {
      if (!roll.success) {
        pushNarrative(`${enemy.name}의 공격이 빗나간다.`);
        return;
      }
      const diceCount = roll.critSuccess ? die.count * 2 : die.count;
      queueDamageRoll(`${enemy.name}의 데미지`, diceCount, die.sides, enemy.dmgBonus || 0, (dmgResult) => {
        pushNarrative(`${enemy.name}이(가) 반격해 ${dmgResult.total}의 피해를 입힌다!`);
        const newHp = Math.max(0, character.hp - dmgResult.total);
        updateChar((c) => { c.hp = newHp; });
        if (newHp <= 0) {
          handleDefeat(enemy);
        }
      });
    });
  };

  const finishCombatWin = (enemy) => {
    setCombat(null);
    pushSystem(`🏆 ${enemy.name}을(를) 쓰러뜨렸다! 경험치 +${enemy.xp}`);
    updateChar((c) => { c.xp += enemy.xp; });
    enemy.loot.forEach((l) => { if (Math.random() < l.chance) { pushSystem(`획득: ${l.name}`); gainItem(l.name, l.id, 1); } });
    setTimeout(handleLevelUpCheck, 50);
    advanceNode();
  };

  const handleDefeat = (enemy) => {
    setCombat(null);
    pushSystem(`💀 ${enemy.name}에게 쓰러졌다...`);
    pushNarrative("눈앞이 아득해지는 순간, 지나가던 순찰대가 당신을 발견해 안전한 곳으로 옮긴다. 상처는 깊었지만, 목숨은 건졌다.");
    updateChar((c) => { c.hp = Math.max(1, Math.floor(c.maxHp * 0.4)); });
  };

  const combatFlee = () => {
    if (!combat) return;
    const target = character.stats.dex + getTraitBonus(character, "flee") + 2 - Math.floor(combat.enemy.dex / 4);
    queueRoll("도주 판정", "민첩", target, (roll) => {
      if (roll.success) { pushNarrative("재빠르게 몸을 빼내 거리를 벌린다."); setCombat(null); }
      else { pushNarrative("도망치지 못했다!"); queueEnemyTurn(); }
    });
  };

  const combatIntimidate = () => {
    if (!combat) return;
    const target = character.stats.cha + getTraitBonus(character, "intimidate") + 2 - Math.floor(combat.enemy.str / 4);
    queueRoll("위협 판정", "매력", target, (roll) => {
      if (roll.success) {
        pushNarrative(`${combat.enemy.name}이(가) 기세에 눌려 움찔한다. 다음 공격이 조금 더 정확해질 것 같다.`);
        setCombat((cb) => cb ? ({ ...cb, enemyFlustered: true }) : cb);
      } else {
        pushNarrative(`${combat.enemy.name}은(는) 눈 하나 깜짝하지 않는다.`);
      }
      queueEnemyTurn();
    });
  };

  /* ---------- Free text ---------- */

  const handleFreeText = () => {
    const t = input.trim();
    if (!t) return;
    pushLog({ type: "player", text: t });
    setInput("");
    if (combat) {
      handleCombatFreeText(t);
      return;
    }
    if (/공격|싸우|전투/.test(t)) startCombat();
    else if (/숨|은신|잠입/.test(t)) doStealthCheck();
    else if (/설득|대화|말/.test(t)) doPersuade();
    else if (/조사|살펴|확인/.test(t)) doTrapCheck();
    else pushNarrative("주변을 둘러보지만 특별한 반응은 없다. 다른 행동을 시도해볼 수 있을 것 같다.");
  };

  const handleCombatFreeText = (t) => {
    if (!combat) return;
    const job = JOBS[character.job];
    const matchedSkill = job.skills.find((s) => s.tier <= character.unlockedSkillTier && t.includes(s.name));
    if (matchedSkill) {
      if (character.mp < matchedSkill.mp) { pushNarrative(`「${matchedSkill.name}」을(를) 쓰려 하지만 마나가 부족하다.`); return; }
      combatAttack(matchedSkill);
    } else if (/도망|도주|피하|물러나/.test(t)) {
      combatFlee();
    } else if (/위협|도발|협박|소리치|노려본다/.test(t)) {
      combatIntimidate();
    } else if (/공격|치다|벤다|찌른다|후려|때린다|찌르|베어/.test(t)) {
      combatAttack(null);
    } else {
      pushNarrative(`"${t}" — 목소리는 전투의 소음 속에 묻히지만, 그 기세만큼은 또렷이 전해진다.`);
      queueEnemyTurn();
    }
  };

  const onSuggestion = (action) => {
    if (action === "stealth") doStealthCheck();
    else if (action === "trap") doTrapCheck();
    else if (action === "disarm") doDisarm();
    else if (action === "persuade") doPersuade();
    else if (action === "combat") startCombat();
    else if (action === "advance") advanceNode();
  };

  const resetGame = () => {
    setScreen("creation"); setCharacter(null); setLog([]); setCombat(null);
    setNodeIdx(0); setPanel(null); setResetConfirm(false);
  };

  if (screen === "creation") {
    return (<div className="esna-root"><GlobalStyle /><CreationFlow onComplete={onCreationComplete} /></div>);
  }

  const node = STORY_NODES[nodeIdx];

  return (
    <div className="esna-root">
      <GlobalStyle />
      <div className="game-header">
        <div className="game-header__title">텍스트 RPG</div>
        <Bar value={character.hp} max={character.maxHp} colorClass="bar-fill bar-fill--hp" label="HP" />
        <Bar value={character.mp} max={character.maxMp} colorClass="bar-fill bar-fill--mp" label="MP" />
      </div>

      <div className="log-scroll">
        {log.map((entry) => <LogEntry key={entry.id} entry={entry} onResolvePending={resolvePendingRoll} />)}
        {!hasPendingRoll && hasActiveChoice && (
          <div className="suggestion-row">
            {log[log.length-1].options.map((o) => (
              <button key={o.label} className="suggestion-btn" onClick={() => onSuggestion(o.action)}>{o.label}</button>
            ))}
          </div>
        )}
        <div ref={logEndRef} />
      </div>

      {combat && (
        <CombatPanel combat={combat} character={character} onAttack={combatAttack} onFlee={combatFlee} onIntimidate={combatIntimidate} locked={hasPendingRoll} />
      )}

      {!combat && !hasPendingRoll && !hasActiveChoice && node && (
        <div className="suggestion-row suggestion-row--floating">
          {node.suggestions.map((s) => (
            <button key={s.label} className="suggestion-btn" onClick={() => onSuggestion(s.action)}>{s.label}</button>
          ))}
        </div>
      )}

      {!hasPendingRoll && !hasActiveChoice && (
        <div className="input-row">
          <input className="text-input" placeholder={combat ? "말이나 행동을 입력하세요... (예: 위협한다, 강타를 사용한다)" : "행동을 입력하세요..."} value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && handleFreeText()} />
          <button className="send-btn" onClick={handleFreeText}><MessageCircle size={16}/></button>
        </div>
      )}

      <div className="bottom-nav">
        <button className="nav-btn" onClick={() => setResetConfirm(true)}><RotateCcw size={18}/><span>초기화</span></button>
        <button className="nav-btn" onClick={() => setPanel("status")}><User size={18}/><span>상태</span></button>
        <button className="nav-btn" onClick={() => setPanel("inventory")}><Backpack size={18}/><span>가방</span></button>
        <button className="nav-btn" onClick={() => setPanel("quest")}><ScrollText size={18}/><span>퀘스트</span></button>
        <button className="nav-btn" onClick={() => setPanel("bestiary")}><BookOpen size={18}/><span>도감</span></button>
      </div>

      {panel && (
        <Modal onClose={() => setPanel(null)}>
          {panel === "status" && <StatusPanel character={character} updateChar={updateChar} />}
          {panel === "inventory" && <InventoryPanel character={character} updateChar={updateChar} onUse={useItem} />}
          {panel === "quest" && <QuestPanel character={character} />}
          {panel === "bestiary" && <BestiaryPanel character={character} />}
        </Modal>
      )}

      {resetConfirm && (
        <Modal onClose={() => setResetConfirm(false)}>
          <div className="confirm-box">
            <div className="confirm-box__title">정말 초기화하시겠습니까?</div>
            <div className="confirm-box__desc">모든 진행 상황이 사라지며 되돌릴 수 없습니다.</div>
            <div className="confirm-box__actions">
              <button className="secondary-btn" onClick={() => setResetConfirm(false)}>취소</button>
              <button className="danger-btn" onClick={resetGame}>초기화</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ============================== COMBAT PANEL ============================== */

function CombatPanel({ combat, character, onAttack, onFlee, onIntimidate, locked }) {
  const job = JOBS[character.job];
  const availableSkills = job.skills.filter((s) => s.tier <= character.unlockedSkillTier && s.mp <= character.mp);
  return (
    <div className="combat-panel">
      <div className="combat-panel__enemy">
        <div className="combat-panel__enemy-name">{combat.enemy.name}</div>
        <Bar value={combat.enemy.curHp} max={combat.enemy.hp} colorClass="bar-fill bar-fill--enemy" label="적 HP" />
      </div>
      <div className="combat-panel__actions">
        <button className="combat-btn combat-btn--atk" disabled={locked} onClick={() => onAttack(null)}><Sword size={16}/> 공격</button>
        {availableSkills.map((s) => (
          <button key={s.name} className="combat-btn combat-btn--skill" disabled={locked} onClick={() => onAttack(s)}>
            <Wand2 size={14}/> {s.name} <span className="mp-cost">MP{s.mp}</span>
          </button>
        ))}
        <button className="combat-btn combat-btn--taunt" disabled={locked} onClick={onIntimidate}><MessageCircle size={14}/> 위협</button>
        <button className="combat-btn combat-btn--flee" disabled={locked} onClick={onFlee}><Footprints size={16}/> 도망</button>
      </div>
    </div>
  );
}

/* ============================== PANELS ============================== */

function Modal({ children, onClose }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}><X size={18}/></button>
        {children}
      </div>
    </div>
  );
}

function StatusPanel({ character, updateChar }) {
  const allocate = (key) => updateChar((c) => { if (c.statPoints > 0) { c.stats[key] += 1; c.statPoints -= 1; } });
  const job = JOBS[character.job];
  const unlockedSkills = job.skills.filter((s) => s.tier <= character.unlockedSkillTier);
  return (
    <div className="panel">
      <div className="panel__title">상태</div>
      <div className="status-summary">
        <div>{character.name} · {character.race} · Lv.{character.level}</div>
        <div className="status-summary__muted">직업: {job.name}</div>
        <div className="status-summary__muted">경험치 {character.xp} / {xpForLevel(character.level)}</div>
        {character.statPoints > 0 && <div className="status-summary__points">분배 가능 포인트: {character.statPoints}</div>}
      </div>
      <div className="stat-grid">
        {STAT_KEYS.map((k) => (
          <div key={k} className="stat-cell">
            <div className="stat-cell__label">{STAT_LABELS[k]}</div>
            <div className="stat-cell__value">{character.stats[k]}</div>
            {character.statPoints > 0 && <button className="mini-plus" onClick={() => allocate(k)}>+</button>}
          </div>
        ))}
      </div>
      <div className="appearance-list">
        <div className="appearance-row">{HEIGHT_TABLE[character.appearance.height]}</div>
        <div className="appearance-row">{BUILD_TABLE[character.appearance.build]}</div>
        <div className="appearance-row">{FEATURE_TABLE[character.appearance.feature]}</div>
      </div>
      {character.traits && character.traits.length > 0 && (
        <div className="traits-list">
          <div className="panel__subtitle">종족 · 배경 특성</div>
          {character.traits.map((t) => (
            <div key={t.name} className="trait-card">
              <div className="trait-card__name">{t.name}</div>
              <div className="trait-card__desc">{t.desc}</div>
            </div>
          ))}
        </div>
      )}
      <div className="traits-list">
        <div className="panel__subtitle">직업 스킬 ({job.name})</div>
        {unlockedSkills.map((s) => (
          <div key={s.name} className="trait-card trait-card--job">
            <div className="trait-card__name">{s.name} <span className="trait-card__tier">Tier {s.tier}</span></div>

}

function InventoryPanel({ character, updateChar, onUse }) {
  const [selected, setSelected] = useState(null);
  const discard = (id, qty) => updateChar((c) => {
    const item = c.inventory.find((i) => i.id === id);
    if (!item) return;
    item.qty -= qty;
    if (item.qty <= 0) c.inventory = c.inventory.filter((i) => i.id !== id);
    setSelected(null);
  });
  const useSelected = () => {
    if (!selected) return;
    onUse(selected);
    const remainingQty = selected.qty - 1;
    setSelected(remainingQty > 0 ? { ...selected, qty: remainingQty } : null);
  };
  const slots = [...character.inventory, ...Array(Math.max(0, 10 - character.inventory.length)).fill(null)];
  return (
    <div className="panel">
      <div className="panel__title">가방 ({character.inventory.length}/10)</div>
      <div className="inv-grid">
        {slots.map((item, idx) => (
          <div key={idx} className={`inv-slot ${item ? "inv-slot--filled" : ""} ${item && ITEM_EFFECTS[item.id] ? "inv-slot--usable" : ""}`} onClick={() => item && setSelected(item)}>
            {item ? (<><span className="inv-slot__name">{item.name}</span><span className="inv-slot__qty">×{item.qty}</span></>) : <span className="inv-slot__empty">·</span>}
          </div>
        ))}
      </div>
      {selected && (
        <div className="inv-detail">
          <div className="inv-detail__name">{selected.name} ×{selected.qty}</div>
          <div className="inv-detail__actions">
            {ITEM_EFFECTS[selected.id] && <button className="primary-btn inv-use-btn" onClick={useSelected}>사용</button>}
            <button className="secondary-btn" onClick={() => discard(selected.id, 1)}>1개 버리기</button>
            <button className="danger-btn" onClick={() => discard(selected.id, selected.qty)}>전부 버리기</button>
          </div>
        </div>
      )}
    </div>
  );
}

function QuestPanel({ character }) {
  return (
    <div className="panel">
      <div className="panel__title">퀘스트</div>
      {character.quests.map((q) => (
        <div key={q.id} className="quest-card">
          <div className="quest-card__title">{q.title} <span className={`quest-tag quest-tag--${q.status}`}>{q.status === "active" ? "진행중" : "완료"}</span></div>
          {q.objectives.map((o, i) => (
            <div key={i} className="quest-objective">
              <span className={`quest-check ${o.done ? "quest-check--done" : ""}`}>{o.done ? "✓" : ""}</span>
              <span className={o.done ? "quest-objective--done" : ""}>{o.text}</span>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function BestiaryPanel({ character }) {
  const [selected, setSelected] = useState(null);
  return (
    <div className="panel">
      <div className="panel__title">몬스터 도감</div>
      <div className="bestiary-grid">
        {character.bestiary.map((m) => (
          <div key={m.id} className={`bestiary-card ${m.discovered ? "" : "bestiary-card--hidden"}`} onClick={() => m.discovered && setSelected(m)}>
            <div className="bestiary-card__icon">{m.discovered ? "👹" : "?"}</div>
            <div className="bestiary-card__name">{m.discovered ? m.name : "???"}</div>
          </div>
        ))}
      </div>
      {selected && (
        <Modal onClose={() => setSelected(null)}>
          <div className="panel__title">{selected.name}</div>
          <div className="status-summary__muted">티어 {selected.tier} · HP {selected.hp}</div>
          <div className="appearance-row">{selected.desc}</div>
        </Modal>
      )}
    </div>
  );
}
